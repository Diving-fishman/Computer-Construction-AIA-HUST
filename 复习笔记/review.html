## 10.4 ⚡ DSP最小系统设计
### 10.4.1 供电电路
**双（多）电源供电：** I/O电压(如3.3V) + 内核电压(如1.2V/1.4V)
设计要求：电压范围、电流足够、内核先于I/O上电、散热设计
**两类DC/DC电源对比：**
| 类型 | 原理 | 优点 | 缺点 | 合适场合 |
|:----|:-----|:-----|:-----|:---------|
| **线性稳压(LDO)** 🔋 | 线性调整 | 电路简单、纹波小 | **效率低**、热耗大 | 低压降、低电流 |
| **开关电源(DC/DC)** ⚡ | PWM控制开关 | **效率高**(>95%)、热耗低 | 纹波较大 | 高压降、高电流 |
**LDO效率公式：** η = Vout/Vin × 100%，热耗 = Iout × (Vin - Vout)
**多级变电：** 输入电压 → DC/DC(开关) → LDO → I/O电压 + 内核电压
### 10.4.2 时钟电路
| 方式 | 原理 | 优点 | 缺点 |
|:----|:-----|:-----|:-----|
| **无源晶振** 🎵 | 需要器件内部集成谐振电路 | 成本低 | 需要芯片支持 |
| **有源晶振** 🎵 | 晶振模块直接输出时钟 | 信号好，使用简单 | 成本略高 |
**时钟信号指标：** 周期(T=1/f)、占空比、稳定时间、沿跳变时间、周期抖动
**时钟管理：** 驱动器件(IDT3805) → 带PLL时钟驱动(CY2308) → FPGA时钟管理(DCM)
### 10.4.3 复位电路
| 方案 | 可靠性 | 建议 |
|:----|:------|:-----|
| **RC复位** 🛠️ | ❌ 不稳定 | **不建议使用** |
| **上电复位器件** ✅ | ✅ 可靠 | **DSP系统建议使用**（如TPS3307） |
| **看门狗复位** 🐕 | ✅ 防止跑飞 | 用于高可靠系统（如MAX706R） |
**TPS3307功能：** 3路电压监控 → 上电产生复位 → 低于门限保持复位 → 高于门限Td=200ms释放
**看门狗MAX706R：** WDI未在1.6s内翻转 → WDO#有效 → 表示程序"跑飞"
### 10.4.4 DSP+FPGA联合系统示例
```
视频输入 → 视频解码 → FPGA(预处理) → 双口RAM → DSP(目标分割/识别/跟踪) → 视频合成 → 视频输出
```
**FPGA负责：** 图像预处理、逻辑控制、接口协议转换
**DSP负责：** 目标分割、目标识别、目标跟踪、视频合成
---
## 10.5 ⏱️ 实时图像处理系统
### 10.5.1 实时性分类
| 类型 | 定义 | 例子 | 要求 |
|:----|:-----|:-----|:-----|
| **硬实时系统** 💀 | 规定时间内必须完成 | 导弹制导、防空预警 | 超时=任务失败 |
| **软实时系统** 😌 | 时间弹性或很长 | 人脸识别门禁、车牌识别 | 超时可容忍 |
**实时性时序：** 处理时间Tp动态变化，若To≤Ti则系统等待新输入 → 实时系统
### 10.5.2 实时图像处理挑战
```
📈 图像数据率骤增：帧频↑ + 分辨率↑ → 数据量↑
📈 信息处理复杂化：手段多样化 + 流程复杂化 → 系统规模↑
📈 I/O吞吐率↑ + 存储容量↑ + 计算资源↑
```
---
## 10.6 🔄 串行处理瓶颈
### 冯·诺依曼瓶颈
```
传统CPU问题：取指/译码/取数/执行串行 → 大部分时间耗在访存
→ 数据频繁往返于ALU和存储器 → 访存带宽制约算法速度
```
### 传统优化方向
```
增加主频 → 增加字长(4→8→16→32→64) → 高速缓存(Cache) → 哈佛结构
→ 流水线 → 精简指令集(RISC) → 多核架构
```
---
## 10.7 ⚡ 并行处理架构 ⭐⭐
### 10.7.1 时间并行（操作级流水线）
```
输入 → Processor 1(Op1) → Processor 2(Op2) → Processor 3(Op3) → 输出
优点：各操作并行执行，吞吐率大幅提升
缺点：不适合迭代算法，受制于操作间数据传递带宽
```
### 10.7.2 空间并行（数据级并行）
```
多数操作在大量像素上执行相同功能 → 将图像分割到多个处理器
分割方式：行分割 | 列分割 | 块分割
架构：SIMD（单指令多数据流）
```
### 10.7.3 大规模并行
每个像素一个独立处理器 → 算法效率极高，但资源消耗巨大，仅适用小图像
### 10.7.4 流处理 ⭐
> **将图像按像素扫描顺序串行化，把空间并行转化为时间并行**
```
图像 → 像素流 → Pipeline操作1 → Pipeline操作2 → ... → 输出
Row 0 → Row 1 → Row 2 → Row 3 → ... → Row N
```
特点：每个像素顺序处理、适合流水线架构、操作内可实现细粒度流水线
---
## 🧠 本章口诀
```
嵌入式系统三特点：嵌入专用和处理
FPGA可重复编程，图像并行全靠它
最小系统四要素：供电时钟复位JTAG
LDO纹波小效率低，DC/DC效率高纹波大
实时系统分软硬，导弹制导必须硬
串行处理有瓶颈，访存带宽是制约
并行处理四种法：时间空间大规模，流处理把像素串
```

# 🔢 DSP处理器技术 — 从零开始彻底搞懂
> **DSP = Digital Signal Processor（数字信号处理器）**
> **专门为数字信号处理而设计的微处理器，核心优势：单周期内完成乘-加运算（MAC）！**
---
## 📑 本章路线图
```
DSP基本概念 → 性能指标 → DSP特点(哈佛/多总线/流水线/硬件乘法器) → 开发流程 → C641x体系结构 → 存储器接口(FLASH/FIFO) → EMIF可编程接口
  (是什么)     (多快？)         (凭什么快？)              (怎么做)      (具体芯片)      (怎么存)          (怎么连)
```
---
## 11.1 📋 DSP基本概念
### 11.1.1 什么是DSP？
```
DSP = Digital Signal Processor（数字信号处理器）
专门为数字信号处理而设计的微处理器，擅长做乘法、累加、FFT等运算
```
### 11.1.2 DSP芯片分类
| 分类方式 | 类型 | 特点 | 代表 |
|:--------|:-----|:-----|:------|
| **按数据格式** | **定点DSP** 🎯 | 整数运算，成本低 | TMS320C64x |
| | **浮点DSP** 🎯 | 硬件浮点运算，精度高 | TMS320C67x |
| **按用途** | **通用DSP** 🔧 | 可编程，灵活 | TI、ADI系列 |
| | **专用DSP** 📟 | 针对特定算法固化 | FFT专用芯片 |
> 浮点DSP可做定点运算，定点DSP不能做浮点运算（需软件模拟）
### 11.1.3 DSP性能指标 ⭐
| 指标 | 含义 | 示例 |
|:----|:-----|:------|
| **指令周期** ⏱️ | 执行一条指令的时间 | C549-80: 80MHz → 12.5ns |
| **MIPS** 🏃 | 百万条指令/秒 | C6416 @1GHz → **8000 MIPS** |
| **MOPS** 🏃 | 百万次操作/秒 | C6201 @200MHz → 2400 MOPS |
| **MFLOPS** 🔢 | 百万次浮点操作/秒 | ADSP-TS201S → **110.3 GFLOPS** |
| **MAC时间** ✖️➕ | 一次乘-累加时间 | 大部分DSP可**单周期**完成 |
> **MAC = 乘-累加，DSP最核心操作：** `y += a[i] × b[i]`
### 11.1.4 主要DSP厂商
**国际：** TI(C2000/C5000/C6000) | Motorola | ADI(SHARC/TigerSHARC/BlackFin)
**国产：** 国防科大"飞腾"系列 | 中电14所"华睿"DSP | 中电38所"魂芯"DSP
**⚠️ 教训：** 上海交大"汉芯"丑闻(2003-2006) — 打磨MOTO芯片冒充自主创新
### 11.1.5 TI三大DSP平台
| 平台 | 定位 | 应用 |
|:----|:-----|:------|
| **C2000** 🎮 | **最佳测控** | 电机控制、工业自动化 |
| **C5000** 📱 | **低功耗** | 手机、数码相机 |
| **C6000** 🚀 | **高性能(VLIW)** | 无线基站、视频监控、医疗成像 |
**C6000子系列：** C62x(定点) → **C64x**(定点,4000MIPS)⭐ → C67x(浮点) → C674x(低功耗混合) → C647x(多核) → KeyStone(最强)
---
## 11.2 🔬 DSP芯片的特点 ⭐⭐⭐
### 11.2.1 采用超级哈佛结构
```
冯·诺依曼：统一存储器 ←总线→ CPU（指令数据不能同时取）
哈佛结构：程序存储器 ←→ CPU ←→ 数据存储器（可同时取！）
```
### 11.2.2 采用多总线结构 ⭐
```
一个机器周期内可完成：取指令 + 读2个操作数 + 写1个操作数
TMS320C54x有4组总线(P/C/D/E)，每组含地址总线和数据总线
```
### 11.2.3 采用流水线技术 ⭐
```
四级流水线：取指 → 译码 → 读数 → 执行
流水线填满后，每个时钟周期都有一条指令完成 → 吞吐率=1条/周期
```
### 11.2.4 集成功能强大的CPU
**DSP CPU内核：** ALU + 累加器(ACC) + **硬件乘法器**⭐ + 乘加单元(MAC) + 桶型移位器 + 地址产生器
**C64x：** 双数据通道 + 8个功能单元 → 单周期可同时执行8条指令！
### 11.2.5 集成专用硬件乘法器 ⭐
| 处理器 | 乘法周期 | 原因 |
|:-------|:--------:|:------|
| MCS-51单片机 | 4周期 | 无硬件乘法器 |
| **通用DSP** 🚀 | **1周期** | **有专用硬件乘法器** |
**C6000有2个硬件乘法器** → 单周期可做2次乘法！
### 11.2.6 特殊专用指令
**复合指令**（一条指令完成多个操作）：累加 + 乘法 + 地址更新 同时完成
**其他：** 指令重复循环硬件 | 位翻转指令(FFT) | 循环寻址(卷积) | 互锁指令(多片通信)
### 11.2.7 嵌入强大硬件功能
```
DSP = 数字信号处理能力 + 嵌入式功能
片内外设：JTAG + 时钟管理 + Bootloader + 程序/数据存储器 + 电源控制 + 通信端口 + HPI + 定时器 + 模拟I/O + 编解码器
```
---
## 11.3 🛠️ DSP系统设计
### 设计流程
```
需求分析 → 算法研究 → 器件选型 → 硬件设计+软件设计 → 调试 → 系统集成
```
### DSP选型原则
定点VS浮点(图像一般选定点) | 内存大小(片上内存快) | 外设接口 | 功耗 | 成本
### 开发工具
**CCS**(Code Composer Studio) + **JTAG**仿真器 + 目标硬件板
**流程：** C/汇编 → MATLAB仿真 → CCS仿真 → JTAG调试 → 软件固化
---
## 11.4 🏗️ TMS320C64x体系结构 ⭐⭐
### 系统组成
```
CPU内核(8功能单元) + 片上存储器(L1+L2) + EDMA控制器(64通道) + 片上外设(EMIFA/EMIFB/McBSP/GPIO) + 时钟管理 + 启动配置
```
### 内核功能单元（A/B两组，每组4个）
| 单元 | 功能 | 说明 |
|:-----|:-----|:------|
| **.L** 🧮 | 算术和逻辑运算(ALU) | 加减、与或非、比较 |
| **.S** 🔄 | 移位、位操作、分支 | 逻辑运算 |
| **.M** ✖️ | **乘法运算** ⭐ | 单周期乘法 |
| **.D** 📍 | 数据寻址操作 | 寄存器↔内存 |
**VLIW：** 单周期打包多个操作分配给8个单元 → **单周期最多8条指令！**
### 中断系统
16种优先级(INT_00最高=RESET) | 4个不可屏蔽(INT_00~03) | INT4~7用户外部中断
**IST中断服务表：** 512Byte | 16个ISFP(每个32Byte/8指令) | 复位中断必须存地址0
### 两级存储结构 ⭐
```
CPU内核 ↔ L1P(16KB) + L1D(16KB) (Cache,用户不可直接访问) ↔ L2(1MB) (用户可访问) ↔ EDMA/外设
```
### EDMA控制器 ⭐
**特性：** 64通道 | 4优先级 | 独立于CPU | 支持8/16/32bit
**启动方式：** CPU启动 | **同步事件触发**⭐(外设突发传输) | 链触发
### 外部存储器接口EMIF ⭐
| 接口 | 位宽 | 用途 |
|:-----|:----:|:------|
| **EMIFA** | 64位 | 连接大容量高速存储器 |
| **EMIFB** | 16位 | 连接低速外设 |
**支持：** 同步静态(SBSRAM) | 同步动态(SDRAM) | 异步(FLASH/EEPROM)
**控制寄存器：** GBLCTL | CExCTL | CExSEC | SDCTL | SDTIM | SDEXT
---
## 11.5 💾 存储器接口技术
### FLASH存储器
**FLASH历史：** 1984年东芝舛冈富士雄发明 → 1988 Intel NOR → 1989东芝NAND
**NOR vs NAND：**
| 对比 | NOR | NAND |
|:----|:----|:------|
| 访问方式 | 随机(字节寻址) | **按页访问** |
| 读取速度 | **快**（支持XIP直接运行） | 慢（需先读到RAM） |
| 容量 | 小 | **大** |
| 应用 | BIOS、程序存储 | U盘、SSD |
**SST39VF080 NOR FLASH：** 1M×8bit | 4KB扇区 | 64KB块 | 字节编程 | 扇区/块/整片擦除
### FIFO存储器 ⭐
**FIFO = First In First Out（先进先出队列）**
**两种模式：**
| 模式 | 读时序 |
|:----|:-------|
| **标准模式** 📋 | 读使能→下周期数据有效 |
| **FWFT模式** 🚀 | 读使能→当前周期数据有效 |
**使用场合：** 速度匹配(ADC→FIFO→DSP) | FPGA内部IP核
**⚠️ 要点：** 判空/满标志避免异常 | 满时写入→满异常 | 空时读出→空异常 | 异常后只能复位恢复
### EMIF可编程异步接口
**时序参数：** Setup(建立时间≥1) + Strobe(选通时间≥1) + Hold(保持时间≥0)
**约束：** TSetup+TStrobe+THold ≥ TRC min | TSetup+TStrobe ≥ TAA max | TStrobe ≥ TOE max
### EMIF可编程同步接口
**控制信号：** SOE#/SOE3#/SWE#/SADS/SRE#/ECLKOUT1/2
**延迟可编程：** 读出SYNCRL(最大3周期) | 写入SYNCWL(最大3周期)

DSP全称有两意：数字信号处理和技术

    '<div class="content" id="cContent"></div>'+
    '<div style="margin-top:12px;text-align:center">'+
      '<button id="fullBtn" style="padding:10px 28px;border-radius:24px;cursor:pointer;font-size:14px;font-weight:500;background:#1a56db;color:#fff;border:none;box-shadow:0 2px 8px rgba(26,86,219,.3)" onclick="toggleFull('+idx+')">展开完整文档</button>'+
      '<div class="content" id="cFull" style="display:none;margin-top:12px"></div>'+
    '</div>';
  renderChapterContent(idx);
}

function renderChapterContent(idx) {
  var c = chapters[idx];
  var el = document.getElementById('cContent');
  var src = document.getElementById('md-'+c.id);
  if(!src || !src.textContent.trim()) { el.innerHTML = '<p style="color:red">内容加载失败</p>'; return; }
  try {
    var full = src.textContent;
    var preview = full.substring(0, 2000) + '\n\n> *(下方点击「展开完整文档」查看全部内容)*';
    el.innerHTML = marked.parse(preview);
  } catch(e) {
    el.innerHTML = '<p style="color:red">内容加载失败</p>';
  }
}

function toggleFull(idx) {
  var fullDiv = document.getElementById('cFull');
  var btn = document.getElementById('fullBtn');
  if(fullDiv.style.display !== 'none') {
    fullDiv.style.display = 'none';
    btn.textContent = '展开完整文档';
    return;
  }
  var c = chapters[idx];
  var fullContent = document.getElementById('md-'+c.id);
  if(!fullContent || !fullContent.textContent.trim()) {
    btn.textContent = '暂无完整文档';
    return;
  }
  try {
    fullDiv.innerHTML = marked.parse(fullContent.textContent);
  } catch(e) {
    fullDiv.innerHTML = '<p style="color:red">加载失败</p>';
    return;
  }
  fullDiv.style.display = 'block';
  btn.textContent = '收起文档';
}

function doSearch(val) {
  if(!val.trim()) return;
  var results = chapters.filter(function(c){
    return c.title.indexOf(val) !== -1 || c.desc.indexOf(val) !== -1;
  });
  if(results.length === 0) {
    alert('没有找到匹配的章节');
    return;
  }
  var idx = chapters.indexOf(results[0]);
  openChapter(idx);
}

renderHome();
</script>
</body>
</html>
